<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFlow - Compact PDF Code</title>

    <!-- Vendor -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <!-- App CSS -->
    <link rel="stylesheet" href="src/css/variables.css">
    <link rel="stylesheet" href="src/css/layout.css">
    <link rel="stylesheet" href="src/css/header.css">
    <link rel="stylesheet" href="src/css/split-resizer.css">
    <link rel="stylesheet" href="src/css/document.css">
    <link rel="stylesheet" href="src/css/pdf-mode.css">
    <link rel="stylesheet" href="src/css/pdf-overlay.css">
    <link rel="stylesheet" href="src/css/print.css">
    <link rel="stylesheet" href="src/css/editor-highlight.css">
    <link rel="stylesheet" href="src/css/responsive.css">
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <div class="brand-icon">
                <span class="material-symbols-rounded" style="font-size: 20px;">description</span>
            </div>
            <div>DocuFlow <span class="subtitle">Compact Edition</span></div>
        </div>

        <button class="btn-pdf" id="btn-pdf" onclick="generatePDF()">
            <span class="material-symbols-rounded">save</span>
            Save PDF
        </button>
    </header>

    <div class="workspace">
        <div class="editor-pane" id="editor-pane">
            <div class="pane-label">
                <span class="material-symbols-rounded" style="font-size: 16px;">edit_note</span>
                Markdown Editor
            </div>
            <div class="editor-container">
                <div class="editor-backdrop" id="editor-backdrop" aria-hidden="true"><div class="editor-highlight-inner" id="editor-highlight"></div></div>
                <textarea id="md-input" spellcheck="false" placeholder="Start writing your document here..."></textarea>
            </div>
        </div>

        <div class="split-resizer" id="split-resizer" role="separator" aria-orientation="vertical" aria-label="Resize editor and preview" tabindex="0"></div>

        <div class="preview-pane" id="preview-pane">
            <div id="doc-render"></div>
        </div>
    </div>

    <!-- Vendor JS -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- App JS -->
    <script src="src/js/editor-highlight.js"></script>
    <script src="src/js/renderer.js"></script>
    <script src="src/js/pdf-generator.js"></script>
    <script src="src/js/split-resizer.js"></script>
</body>
</html>
